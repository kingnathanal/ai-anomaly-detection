# Mosquitto MQTT broker configuration for anomaly detection testbed
# Deployed to /etc/mosquitto/conf.d/anomaly-detection.conf

# ── Listener ─────────────────────────────────────────────────────
# Accept connections from edge agents on all interfaces
listener 1883 0.0.0.0

# ── Authentication ───────────────────────────────────────────────
allow_anonymous false
password_file /etc/mosquitto/passwd


# ── Logging ──────────────────────────────────────────────────────
log_dest syslog
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ── Limits ───────────────────────────────────────────────────────
max_connections 50
max_inflight_messages 20
max_queued_messages 1000
